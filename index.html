<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>A K STUDIO</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>

    <body>
        <header>
            <h1>A K STUDIO</h1>
        </header>
        <div class="container">
            <div class="content">
               <div class="home">
                <i class="fa-regular fa-house"></i>
                <p>Home</p>
            </div> 
                <div class="account">
                    <i class="fa-solid fa-circle-user"></i>
                <p>About</p>
                </div>

                <div class="service"> 
                    <i class="fa-regular fa-camera"></i>
                    <P>Service</P>
                </div>
            </div>
            <div class="login">
                <button> <i class="fa-regular fa-user"></i> Login</button>
                <div class="help">
                <i class="fa-solid fa-bars"></i>
                 <p>Help</p>
                </div>
            </div>
           
        </div>

        <div class="package">
            <div class="destination">
                <img class="photo" src="destinaton wedding.jpg" alt="Destination Wedding">
                <h3>DESTINATION WEDDING</h3>
                <br>
                <p><b>Price</b>- RS 60000 ~ RS 80000</p>
            </div>
            <div class="traditional">
                <img class="photo" src="traditional.jpg" alt="Traditional Wedding">
                <h3>TRADITIONAL WEDDING</h3>
                <br>
                <p><b>Price</b>- RS 30000 ~ RS 50000</p>
            </div>
            <div class="get-together">
                <img class="photo" src="get-together.jfif" alt="Get-Together">
                <h3>GET TOGETHER</h3>
                <br>
                <P><b>Price</b>- RS 15000 ~ RS 25000</P>
            </div>
            <div class="birthday">
                <img src="birthday.jfif" alt="Birthday" class="photo">
                <h3>BIRTHDAY PARTY</h3>
                <br>
                <p><b>Price</b>- RS 25000 ~ 40000</p>
            </div>
            <div class="picnic">
                <img src="Picnic.jfif" alt="Tour" class="photo">
                <h3>TOUR</h3>
                <p><b>Price</b>- RS 30000 ~ RS 50000</p>
            </div>
        </div>

        <footer>
            <div class="footer">
                <img src="insta_icon-removebg-preview.png" alt="Instagram" class="icon">
                <img src="facebook-removebg-preview.png" alt="Facebook" class="icon">
                <img src="youtube-removebg-preview.png" alt="Youtube" class="icon">
                
            </div>
        </footer>
    </body>

</html>
